info:
  name: GET /api/webhooks
  type: http
  seq: 2

http:
  method: GET
  url: "{{API_BASE_URL}}/api/webhooks"
  headers:
    - name: Authorization
      value: Bearer {{JWT_TOKEN}}
    - name: X-Facility-ID
      value: "{{FACILITY_ID}}"
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
