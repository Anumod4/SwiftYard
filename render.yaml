services:
  - type: web
    name: swiftyard-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
